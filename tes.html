<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I Am So Sorry My Queen</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00f2ff;
        }

        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #020202; 
            font-family: 'Hind Siliguri', sans-serif; 
            overflow: hidden; 
            color: white;
            position: fixed; /* মোবাইল স্ক্রিন নড়াচড়া বন্ধ করতে */
            width: 100%;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a000a 0%, #020202 100%);
            z-index: -1;
        }

        .container { 
            width: 85%; 
            max-width: 400px; 
            padding: 30px 20px; 
            background: rgba(20, 20, 20, 0.9); 
            border-radius: 30px; 
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            text-align: center; 
            z-index: 10;
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem; 
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            margin: 0 0 15px 0;
        }

        #text-container { 
            text-align: left; 
            font-size: 1rem; 
            line-height: 1.5;
            min-height: 120px; 
            color: #ffdae0; 
            margin-bottom: 20px;
        }

        .cursor { display: inline-block; width: 2px; height: 18px; background-color: var(--primary); animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        
        button { 
            background: var(--primary);
            border: none;
            color: white; 
            padding: 12px 25px; 
            font-size: 1rem; 
            border-radius: 25px; 
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
            font-family: 'Hind Siliguri', sans-serif;
        }

        /* Popup Styles */
        #poem-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 80%;
            max-width: 350px;
            background: #121212;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--secondary);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            z-index: 100;
            text-align: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #poem-popup.show {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .poem-text { 
            font-style: italic; 
            color: var(--secondary); 
            font-size: 1rem; 
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 90;
        }

        .floating { position: absolute; pointer-events: none; z-index: 5; animation: floatUp linear forwards; }
        @keyframes floatUp { from { transform: translateY(110vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="bg-animate"></div>

    <div class="container">
        <h1>Sorry Babee...</h1>
        <div id="text-container"><span id="typed-text"></span><span class="cursor"></span></div>
        <button id="poem-btn" style="display: none;" onclick="showPoem()">SOMETHING FOR MY RAFIHAR AMMU....</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="poem-popup">
        <div class="poem-text">
            "অভিমানী মেঘ সরিয়ে দাও ওই নীল আকাশ থেকে,<br>
            একটু হাসো আগের মতো, আমায় ভালোবাসার চাদরে ঢেকে।<br>
            ভুল করে ফেলেছি খুব, জানি আমারই ছিল সব দায়,<br>
            রাগ করো না লক্ষ্মীটি, তোমার হাসিই আমার বেঁচে থাকার উপায়।"
        </div>
        <h2 style="color: #ff85a1; font-family: 'Dancing Script', cursive; font-size: 1.5rem; margin: 10px 0;">LOVE YOU SO MUCH PAKHI 💖</h2>
        <button onclick="closePopup()" style="background: #333; padding: 8px 15px; font-size: 0.8rem;"></button>
    </div>

    <script>
        const texts = [
            "প্রিয়তমা, ",
            "আমি জানি আমি অনেক বড় ভুল করে ফেলেছি।",
            "তখন আমার মাথা খুব খারাপ ছিল, তাই আমি তোমার সাথে ওরকম আচরণ করেছি।",
            "বিশ্বাস করো, তোমাকে কষ্ট দেওয়া আমার উদ্দেশ্য ছিল না।",
            "তুমি ছাড়া আমার জগতটা পুরো অন্ধকার।",
            "please...... আমাকে ক্ষমা করে দাও।",
            "আমি কথা দিচ্ছি, আর কখনও এমন হবে না।"
        ];

        let textIndex = 0;
        let charIndex = 0;
        const typedTextElement = document.getElementById("typed-text");

        function typeWriter() {
            if (textIndex < texts.length) {
                if (charIndex < texts[textIndex].length) {
                    typedTextElement.innerHTML += texts[textIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 50);
                } else {
                    typedTextElement.innerHTML += "<br>";
                    textIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 800);
                }
            } else {
                document.getElementById("poem-btn").style.display = "inline-block";
            }
        }

        function createEffect(emoji) {
            const el = document.createElement('div');
            el.innerHTML = emoji;
            el.className = 'floating';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            el.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }

        function showPoem() {
            document.getElementById("overlay").style.display = "block";
            const popup = document.getElementById("poem-popup");
            popup.style.display = "block";
            setTimeout(() => popup.classList.add("show"), 10);
            
            // Effect burst
            for(let i=0; i<25; i++) {
                setTimeout(() => { createEffect('❤️'); createEffect('🎈'); }, i * 150);
            }
            setInterval(() => createEffect('💖'), 500);
        }

        function closePopup() {
            document.getElementById("poem-popup").classList.remove("show");
            document.getElementById("overlay").style.display = "none";
            setTimeout(() => { document.getElementById("poem-popup").style.display = "none"; }, 400);
        }

        window.onload = () => setTimeout(typeWriter, 1000);
        setInterval(() => createEffect('✨'), 2000);
    </script>
</body>
</html>
